{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <div>
      <h1>AI Message-to-Task</h1>
      <p class="muted">Extract calendar events and tasks, review them, then add them to Google Calendar or Google Tasks.</p>
    </div>
  </div>
  <form method="post" action="{{ url_for('extract') }}">
    <label for="message">Paste a chat message, email, course notice, or meeting note</label>
    <textarea id="message" name="message" required></textarea>
    <p>
      <button type="submit" data-loading-text="Extracting with AI...">Extract Tasks</button>
    </p>
  </form>
{% endblock %}
