{% extends "base.html" %}

{% block content %}
  <section class="hero">
    <h1>Turn messages into Google-ready plans.</h1>
    <p class="muted">Paste a message, review the extracted events and tasks, then add them to Google Calendar or Google Tasks.</p>
  </section>

  <form class="item" method="post" action="{{ url_for('extract') }}">
    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>
    <div class="actions">
      <button type="submit" data-loading-text="Extracting with AI...">Extract Tasks</button>
      <span class="muted">Example: “Meeting tomorrow at 3pm and submit report Friday.”</span>
    </div>
  </form>
{% endblock %}
