<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Message-to-Task</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --bg: #f8fafc;
        --border: #d9e2ec;
        --danger: #b42318;
        --danger-bg: #fff1f0;
        --muted: #64748b;
        --panel: #ffffff;
        --panel-soft: #eef4ff;
        --success: #116329;
        --success-bg: #e8f8ee;
        --text: #172033;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 0;
      }
      .app-shell {
        margin: 0 auto;
        max-width: 1120px;
        padding: 1.25rem;
      }
      nav {
        align-items: center;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--border);
        border-radius: 8px;
        display: flex;
        gap: 0.5rem;
        justify-content: space-between;
        margin-bottom: 1.25rem;
        padding: 0.55rem;
      }
      .brand {
        color: var(--text);
        font-weight: 750;
        padding: 0.35rem 0.55rem;
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 0.35rem;
      }
      .nav-links a {
        border-radius: 6px;
        color: var(--muted);
        padding: 0.4rem 0.65rem;
        text-decoration: none;
      }
      .nav-links a:hover {
        background: var(--panel-soft);
        color: var(--accent-dark);
      }
      main {
        display: grid;
        gap: 1.25rem;
      }
      a {
        color: var(--accent);
      }
      h1, h2, h3, p {
        margin-top: 0;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        line-height: 1.02;
        margin-bottom: 0.65rem;
      }
      h2 {
        font-size: 1.1rem;
        margin-bottom: 0.65rem;
      }
      h3 {
        font-size: 1rem;
        margin-bottom: 0;
      }
      label {
        color: var(--muted);
        display: block;
        font-weight: 650;
        margin-bottom: 0.55rem;
      }
      textarea {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        font: inherit;
        min-height: 220px;
        padding: 1rem;
        resize: vertical;
        width: 100%;
      }
      textarea:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(37, 99, 235, 0.14);
      }
      button, .button {
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 7px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 700;
        justify-content: center;
        padding: 0.62rem 0.9rem;
        text-decoration: none;
      }
      button:hover, .button:hover {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
      }
      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
      .secondary {
        background: #fff;
        border-color: var(--border);
        color: var(--text);
      }
      .secondary:hover {
        background: #f8fafc;
        border-color: #b9c6d3;
        color: var(--text);
      }
      .danger {
        color: var(--danger);
      }
      .page-header {
        align-items: end;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1fr) auto;
      }
      .hero, .panel, .item, .notice {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      }
      .hero {
        overflow: hidden;
        padding: clamp(1.2rem, 4vw, 2rem);
        position: relative;
      }
      .hero::before {
        background: linear-gradient(90deg, var(--accent), #14b8a6);
        content: "";
        display: block;
        height: 4px;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
      }
      .panel {
        align-items: center;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 1rem;
      }
      .section-heading, .item-header {
        align-items: center;
        display: flex;
        gap: 0.75rem;
        justify-content: space-between;
      }
      .item-list {
        display: grid;
        gap: 0.85rem;
      }
      .item {
        padding: 1rem;
      }
      .item-actions {
        border-top: 1px solid var(--border);
        margin-top: 0.9rem;
        padding-top: 0.85rem;
      }
      .badge {
        background: #f1f5f9;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        padding: 0.2rem 0.55rem;
        white-space: nowrap;
      }
      .success-badge {
        background: var(--success-bg);
        border-color: #b7ebc6;
        color: var(--success);
      }
      .error, .success {
        border-radius: 8px;
        padding: 0.8rem 1rem;
      }
      .error {
        background: var(--danger-bg);
        border: 1px solid #ffccc7;
        color: #a8071a;
      }
      .success {
        background: var(--success-bg);
        border: 1px solid #b7ebc6;
        color: var(--success);
      }
      .muted, .empty-state {
        color: var(--muted);
      }
      .empty-state {
        background: #fff;
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 1rem;
      }
      pre {
        background: #0f172a;
        border-radius: 8px;
        color: #e2e8f0;
        overflow-x: auto;
        padding: 1rem;
      }
      details {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.85rem 1rem;
      }
      dl {
        display: grid;
        gap: 0.4rem 1rem;
        grid-template-columns: minmax(96px, max-content) 1fr;
        margin-bottom: 0;
      }
      dt {
        color: var(--muted);
        font-weight: 750;
      }
      dd {
        margin: 0;
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      @media (max-width: 720px) {
        .app-shell {
          padding: 0.8rem;
        }
        nav, .page-header, .panel {
          align-items: stretch;
          grid-template-columns: 1fr;
        }
        nav {
          flex-direction: column;
        }
        .nav-links {
          width: 100%;
        }
        .nav-links a {
          flex: 1;
          text-align: center;
        }
        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav>
        <a class="brand" href="{{ url_for('index') }}">AI Message-to-Task</a>
        <div class="nav-links">
          <a href="{{ url_for('index') }}">Paste</a>
          <a href="{{ url_for('items') }}">Saved Items</a>
        </div>
      </nav>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      document.querySelectorAll("form").forEach((form) => {
        form.addEventListener("submit", (event) => {
          const message = form.dataset.confirm;
          if (message && !window.confirm(message)) {
            event.preventDefault();
            return;
          }
          const button = form.querySelector("button[type='submit']");
          if (!button) {
            return;
          }
          button.disabled = true;
          button.dataset.originalText = button.textContent;
          button.textContent = button.dataset.loadingText || "Working...";
        });
      });
    </script>
  </body>
</html>
