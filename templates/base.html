<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Message-to-Task</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 2rem auto;
        max-width: 960px;
        padding: 0 1rem;
      }
      nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      textarea {
        box-sizing: border-box;
        min-height: 180px;
        width: 100%;
      }
      button, .button {
        cursor: pointer;
        display: inline-block;
        padding: 0.55rem 0.8rem;
      }
      .section-heading {
        align-items: center;
        display: flex;
        gap: 1rem;
        justify-content: space-between;
      }
      .item {
        border: 1px solid #d0d7de;
        border-radius: 6px;
        margin: 1rem 0;
        padding: 1rem;
      }
      .error {
        background: #fff1f0;
        border: 1px solid #ffccc7;
        border-radius: 6px;
        color: #a8071a;
        padding: 0.75rem 1rem;
      }
      .success {
        background: #f6ffed;
        border: 1px solid #b7eb8f;
        border-radius: 6px;
        color: #237804;
        padding: 0.75rem 1rem;
      }
      pre {
        background: #f6f8fa;
        overflow-x: auto;
        padding: 1rem;
      }
      dt {
        font-weight: 700;
      }
      dd {
        margin: 0 0 0.75rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="{{ url_for('index') }}">Paste Message</a>
      <a href="{{ url_for('items') }}">Saved Items</a>
    </nav>
    {% block content %}{% endblock %}
    <script>
      document.querySelectorAll("form").forEach((form) => {
        form.addEventListener("submit", () => {
          const button = form.querySelector("button[type='submit']");
          if (!button) {
            return;
          }
          button.disabled = true;
          button.dataset.originalText = button.textContent;
          button.textContent = button.dataset.loadingText || "Working...";
        });
      });
    </script>
  </body>
</html>
